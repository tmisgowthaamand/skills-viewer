<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A–Z Business Skills Reader</title>
  <meta name="description" content="Browse 92 business types with 460 skill files.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #06060b;
      --bg-secondary: #0c0c14;
      --bg-tertiary: #13131f;
      --bg-card: #111119;
      --bg-hover: #1a1a2a;
      --bg-active: #1f1f35;
      --border: rgba(255, 255, 255, 0.06);
      --border-light: rgba(255, 255, 255, 0.1);
      --text-primary: #f0f0f8;
      --text-secondary: #a0a0b8;
      --text-muted: #5a5a72;
      --accent: #6c5ce7;
      --accent-bright: #a388ee;
      --accent-glow: rgba(108, 92, 231, 0.12);
      --gradient-1: linear-gradient(135deg, #6c5ce7, #a388ee);
      --gradient-2: linear-gradient(135deg, #6c5ce7, #00cec9);
      --bg-pattern: radial-gradient(circle at 15% 50%, rgba(108, 92, 231, 0.04), transparent 30%), radial-gradient(circle at 85% 30%, rgba(0, 206, 201, 0.03), transparent 30%);
      --header-bg: rgba(12, 12, 20, 0.8);
      --sidebar-bg: rgba(12, 12, 20, 0.85);
      --tab-bg: rgba(6, 6, 11, 0.9);
      --welcome-icon-shadow: rgba(108, 92, 231, 0.2);
    }

    [data-theme="light"] {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f3f5;
      --bg-card: #ffffff;
      --bg-hover: #e9ecef;
      --bg-active: #e2eafc;
      --border: rgba(0, 0, 0, 0.08);
      --border-light: rgba(0, 0, 0, 0.12);
      --text-primary: #1a1b1e;
      --text-secondary: #495057;
      --text-muted: #868e96;
      --accent: #5c4bdb;
      --accent-bright: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.08);
      --bg-pattern: radial-gradient(circle at 15% 50%, rgba(108, 92, 231, 0.04), transparent 30%), radial-gradient(circle at 85% 30%, rgba(0, 206, 201, 0.03), transparent 30%);
      --header-bg: rgba(255, 255, 255, 0.8);
      --sidebar-bg: rgba(255, 255, 255, 0.85);
      --tab-bg: rgba(248, 249, 250, 0.9);
      --welcome-icon-shadow: rgba(108, 92, 231, 0.15);
    }

    /* ─── THEME TOGGLE ─── */
    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      background-image: var(--bg-pattern);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }

    .fade-up {
      animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header h1 span.logo-text {
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      background: var(--accent-glow);
      color: var(--accent-bright);
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid rgba(108, 92, 231, 0.2);
    }

    .search-box {
      margin: 16px 16px 12px;
      position: relative;
      flex-shrink: 0;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: var(--bg-hover);
    }

    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .letter-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 4px 16px 12px;
      flex-shrink: 0;
    }

    .letter-btn {
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .letter-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .letter-btn.active {
      background: var(--gradient-1);
      color: #fff;
    }

    .letter-btn.disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    .business-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 20px;
    }

    .business-list::-webkit-scrollbar {
      width: 4px;
    }

    .business-list::-webkit-scrollbar-thumb {
      background: rgba(108, 92, 231, 0.3);
      border-radius: 10px;
    }

    .letter-group {
      margin-bottom: 4px;
    }

    .letter-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 12px 12px 6px;
      opacity: 0.8;
    }

    .biz-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      position: relative;
      animation: slideRight 0.3s ease both;
    }

    .biz-item:hover {
      background: var(--bg-hover);
      transform: translateX(4px);
    }

    .biz-item.active {
      background: var(--accent-glow);
      border-color: rgba(108, 92, 231, 0.25);
    }

    .biz-item .emoji {
      font-size: 18px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-hover);
      border-radius: 6px;
      flex-shrink: 0;
    }

    .biz-item .name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .biz-item:hover .name {
      color: var(--text-primary);
    }

    .biz-item.active .name {
      color: var(--accent-bright);
      font-weight: 600;
    }

    /* ─── MAIN ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
      justify-content: space-between;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar .crumb {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .topbar .crumb-sep {
      color: var(--border-light);
      font-size: 16px;
      margin: 0 4px;
    }

    .topbar .crumb-active {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 14px;
    }

    .tab-bar {
      display: flex;
      gap: 2px;
      padding: 0 40px;
      border-bottom: 1px solid var(--border);
      background: var(--tab-bg);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .tab {
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      color: var(--text-secondary);
    }

    .tab.active {
      color: var(--accent-bright);
      border-bottom-color: var(--accent);
    }

    .tab .tab-icon {
      margin-right: 8px;
      font-size: 14px;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 48px 40px;
    }

    .content-area::-webkit-scrollbar {
      width: 6px;
    }

    .content-area::-webkit-scrollbar-thumb {
      background: rgba(108, 92, 231, 0.25);
      border-radius: 10px;
    }

    .content-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    /* ─── WELCOME STRATEGY ─── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
    }

    .welcome-icon {
      font-size: 56px;
      margin-bottom: 24px;
      filter: drop-shadow(0 8px 16px var(--welcome-icon-shadow));
    }

    .welcome h2 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 12px;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      color: var(--text-secondary);
      font-size: 15px;
      max-width: 440px;
      line-height: 1.7;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 40px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 24px 36px;
      text-align: center;
      transition: transform 0.3s, border-color 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(108, 92, 231, 0.3);
    }

    .stat-card .num {
      font-size: 32px;
      font-weight: 900;
      background: var(--gradient-2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ─── MARKDOWN STYLES (Aligned and polished) ─── */
    .md {
      text-align: left;
    }

    .md>*:first-child {
      margin-top: 0;
    }

    .md h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.8px;
      margin-bottom: 12px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .md h2 {
      font-size: 20px;
      font-weight: 700;
      margin-top: 40px;
      margin-bottom: 16px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .md h2::before {
      content: '';
      width: 4px;
      height: 18px;
      background: var(--gradient-1);
      border-radius: 4px;
    }

    .md h3 {
      font-size: 16px;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .md p {
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 16px;
      font-size: 14.5px;
    }

    .md strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .md em {
      color: var(--text-secondary);
      font-style: italic;
    }

    .md a {
      color: var(--accent-bright);
      text-decoration: none;
      border-bottom: 1px solid rgba(163, 136, 238, 0.3);
    }

    .md a:hover {
      border-bottom-color: var(--accent-bright);
    }

    .md ul,
    .md ol {
      margin: 16px 0;
      padding-left: 24px;
    }

    .md li {
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-size: 14.5px;
    }

    .md li::marker {
      color: var(--accent);
    }

    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 16px 24px;
      margin: 24px 0;
      background: var(--accent-glow);
      border-radius: 0 12px 12px 0;
      color: var(--text-secondary);
      font-size: 14.5px;
      line-height: 1.7;
    }

    .md hr {
      border: none;
      height: 1px;
      background: var(--border-light);
      margin: 36px 0;
    }

    .md code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(108, 92, 231, 0.1);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--accent-bright);
    }

    .md pre {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
      overflow-x: auto;
    }

    .md pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.7;
    }

    .md table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 14px;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .md thead {
      background: var(--bg-tertiary);
    }

    .md th {
      padding: 14px 18px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent-bright);
      border-bottom: 1px solid var(--border-light);
    }

    .md td {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .md tr:last-child td {
      border-bottom: none;
    }

    .md tr:hover td {
      background: var(--accent-glow);
      color: var(--text-primary);
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-header fade-in">
      <h1>🏢 <span class="logo-text">A–Z Skills</span> <span class="badge">92</span></h1>
    </div>
    <div class="search-box fade-in" style="animation-delay: 0.1s">
      <input type="text" id="searchInput" placeholder="Search businesses...">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.3-4.3" />
      </svg>
    </div>
    <div class="letter-nav fade-in" id="letterNav" style="animation-delay: 0.15s"></div>
    <div class="business-list fade-in" id="bizList" style="animation-delay: 0.2s"></div>
  </aside>

  <main class="main">
    <div class="topbar fade-in" id="topbar">
      <div class="topbar-left">
        <span class="crumb">skills</span><span class="crumb-sep">›</span>
        <span class="crumb-active" id="crumbName">Select a business</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </div>
    <div class="tab-bar fade-in" id="tabBar" style="display:none;">
      <button class="tab active" data-file="SKILL.md"><span class="tab-icon">📋</span>Overview</button>
      <button class="tab" data-file="business-plan.md"><span class="tab-icon">📊</span>Business Plan</button>
      <button class="tab" data-file="finance.md"><span class="tab-icon">💰</span>Finance</button>
      <button class="tab" data-file="marketing.md"><span class="tab-icon">📣</span>Marketing</button>
      <button class="tab" data-file="operations.md"><span class="tab-icon">⚙️</span>Operations</button>
    </div>
    <div class="content-area" id="contentArea">
      <div class="welcome fade-up">
        <div class="welcome-icon">🏢</div>
        <h2>A–Z Business Skills</h2>
        <p>Select any business from the sidebar to explore its complete skill files — strategy, finance, marketing, and
          operations.</p>
        <div class="stats-row">
          <div class="stat-card">
            <div class="num">92</div>
            <div class="label">Business Types</div>
          </div>
          <div class="stat-card">
            <div class="num">460</div>
            <div class="label">Skill Files</div>
          </div>
          <div class="stat-card">
            <div class="num">A–Z</div>
            <div class="label">Coverage</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    let businesses = [];
    let activeBiz = null;
    let activeFile = 'SKILL.md';
    let activeLetterFilter = null;

    // Theme logic
    const toggleBtn = document.getElementById('themeToggle');
    const moon = document.getElementById('moonIcon');
    const sun = document.getElementById('sunIcon');

    function setTheme(dark) {
      if (dark) {
        document.documentElement.removeAttribute('data-theme');
        moon.style.display = 'none';
        sun.style.display = 'block';
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        moon.style.display = 'block';
        sun.style.display = 'none';
        localStorage.setItem('theme', 'light');
      }
    }

    // Init theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme === 'dark');

    toggleBtn.addEventListener('click', () => {
      const isDark = !document.documentElement.hasAttribute('data-theme');
      setTheme(!isDark);
    });

    // Load static data from window OR fetch API
    async function init() {
      if (window.APP_DATA && window.APP_DATA.businesses) {
        businesses = window.APP_DATA.businesses;
      } else {
        try {
          // Dev mode
          const res = await fetch('/api/businesses');
          if (res.ok) businesses = await res.json();
          // Production fallback if not natively injected
          else businesses = await fetch('./data.json').then(r => r.json());
        } catch (e) {
          businesses = await fetch('./data.json').then(r => r.json());
        }
      }
      buildLetterNav();
      renderList(businesses);
    }

    function buildLetterNav() {
      const letters = new Set(businesses.map(b => b.letter.toUpperCase()));
      const nav = document.getElementById('letterNav');
      nav.innerHTML = '<button class="letter-btn active" onclick="filterByLetter(null)">All</button>';
      for (let i = 65; i <= 90; i++) {
        const ch = String.fromCharCode(i);
        nav.innerHTML += `<button class="letter-btn ${letters.has(ch) ? '' : 'disabled'}" onclick="filterByLetter('${ch}')">${ch}</button>`;
      }
    }

    function filterByLetter(letter) {
      activeLetterFilter = letter;
      document.querySelectorAll('.letter-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === (letter || 'All'));
      });
      runSearch();
    }

    function runSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      let filtered = businesses;
      if (activeLetterFilter) filtered = filtered.filter(b => b.letter.toUpperCase() === activeLetterFilter);
      if (q) filtered = filtered.filter(b => b.name.toLowerCase().includes(q) || b.slug.includes(q));
      renderList(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', runSearch);

    function renderList(list) {
      const el = document.getElementById('bizList');
      const groups = {};
      list.forEach(b => { const l = b.letter.toUpperCase(); (groups[l] = groups[l] || []).push(b); });
      let html = '';
      let idx = 0;
      Object.keys(groups).sort().forEach(letter => {
        html += `<div class="letter-group"><div class="letter-label">${letter}</div>`;
        groups[letter].forEach(b => {
          html += `<div class="biz-item ${activeBiz === b.slug ? 'active' : ''}" data-slug="${b.slug}" onclick="selectBiz('${b.slug}')" style="animation-delay: ${idx++ * 0.015}s">
            <span class="emoji">${b.emoji}</span><span class="name">${b.name}</span></div>`;
        });
        html += `</div>`;
      });
      el.innerHTML = html || '<p style="padding:20px;text-align:center;color:var(--text-muted)">No results found</p>';
    }

    async function selectBiz(slug) {
      activeBiz = slug;
      activeFile = 'SKILL.md';
      const biz = businesses.find(b => b.slug === slug);
      document.getElementById('crumbName').textContent = biz ? `${biz.emoji} ${biz.name}` : slug;
      document.getElementById('tabBar').style.display = 'flex';
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.file === 'SKILL.md'));
      document.querySelectorAll('.biz-item').forEach(i => i.classList.toggle('active', i.dataset.slug === slug));
      await loadFile(slug, 'SKILL.md');
    }

    async function loadFile(slug, file) {
      activeFile = file;
      const area = document.getElementById('contentArea');

      let md = '';
      const biz = businesses.find(b => b.slug === slug);

      // Robust fetch: use preloaded static files if available, otherwise fetch API
      if (biz && biz.files && biz.files[file]) {
        md = biz.files[file];
      } else {
        try {
          const res = await fetch(`/api/file?slug=${slug}&file=${file}`);
          if (res.ok) md = await res.text();
          else md = '# File not found';
          // Check if it's accidentally HTML (Vercel rewrite bug)
          if (md.trim().startsWith('<!DOCTYPE html>')) md = '# Error: File not found in static bundle.';
        } catch (e) { md = '# Error loading file'; }
      }

      // Strip YAML frontmatter (handle both \n and \r\n)
      md = md.replace(/^---\r?\n[\s\S]*?\r?\n---\r?\n/, '');

      const html = marked.parse(md);
      area.innerHTML = `<div class="content-inner fade-up"><div class="md">${html}</div></div>`;
      area.scrollTop = 0;
    }

    document.getElementById('tabBar').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab || !activeBiz) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      loadFile(activeBiz, tab.dataset.file);
    });

    // Intercept markdown link clicks instead of navigating
    document.getElementById('contentArea').addEventListener('click', e => {
      const a = e.target.closest('a');
      if (!a) return;
      let href = a.getAttribute('href');
      if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('#')) return;

      e.preventDefault();

      // Strip out relative path fluff (e.g. ../../bakery/marketing.md -> bakery/marketing.md)
      href = href.replace(/^(\.\.\/|\.\/|\/)+/, '');

      let slug = activeBiz;
      let file = 'SKILL.md';

      if (href.includes('/')) {
        const parts = href.split('/');
        slug = parts[0];
        file = parts[1];
      } else if (href.endsWith('.md')) {
        file = href;
      } else {
        slug = href;
      }

      // Route within the SPA
      const biz = businesses.find(b => b.slug === slug);
      if (biz) {
        if (slug !== activeBiz) {
          selectBiz(slug).then(() => {
            if (file !== 'SKILL.md') {
              const tab = document.querySelector(`.tab[data-file="${file}"]`);
              if (tab) tab.click();
            }
          });
        } else {
          const tab = document.querySelector(`.tab[data-file="${file}"]`);
          if (tab) tab.click();
        }
      }
    });

    init();
  </script>
</body>

</html>
